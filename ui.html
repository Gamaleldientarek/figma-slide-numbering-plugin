  <script>
    // postMessage bridge between ui.html and code.js
    function sendMessage(type, payload) {
      parent.postMessage({ pluginMessage: { type, ...payload } }, '*');
    }

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      switch (msg.type) {
        case 'sections-list':
          // T005: populate section dropdown
          break;
        case 'no-sections':
          // T005: show empty state
          break;
        case 'numbering-complete':
          // T011/T016: display results
          break;
        default:
          console.warn('Unhandled message:', msg.type);
      }
    };

    // Request sections on load
    sendMessage('get-sections');
  </script>
